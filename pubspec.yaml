name: eco_chef_academy
description: EcoChef Academy – web app (Flutter)
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9               # for SVG logo
  graphql_flutter: ^5.1.0           # GraphQL client (works with REST too)
  http: ^1.2.0
  intl: ^0.18.0
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.svg
    - assets/images/hero.png
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf