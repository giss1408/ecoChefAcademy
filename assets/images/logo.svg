<?xml version="1.0" encoding="UTF-8"?>
<!--  Dummy EcoChef logo – replace with your own branding whenever you like  -->
<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 200 200"
    width="200"
    height="200">

  <!-- Circle background (green) -->
  <circle cx="100" cy="100" r="95" fill="#4CAF50"/>

  <!-- Fork + spoon shape (white) -->
  <g fill="#FFFFFF">
    <!-- Fork -->
    <rect x="70" y="45" width="12" height="80" rx="2"/>
    <rect x="70" y="30" width="12" height="12" rx="2"/>
    <rect x="70" y="20" width="12" height="8" rx="2"/>
    <rect x="70" y="10" width="12" height="8" rx="2"/>
    <!-- Spoon -->
    <path d="M118,45 h12 v80 a20,20 0 0 1 -40,0 v-80 h12 v70 a8,8 0 0 0 16,0 z"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="175"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        fill="#FFFFFF"
        text-anchor="middle"
        font-weight="bold">
    EcoChef
  </text>
</svg>